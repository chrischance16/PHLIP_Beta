Your Phlipsophy Cheat Sheet

WHAT IT IS
The Exhaustion Reflex Instinct is your biology firing every survival alarm it has when you push past comfortable. The reflex is automatic. The instinct it produces feels like reality. It is not reality. The collision between that instinct, the indifferent physics of the water, and your mindset is where every race is actually decided.

  article:{
    title:"The Exhaustion Reflex Instinct Principle",
    sub:"By Coach Chance — as shared by Phlip",
    body:`Any kid can learn to swim all four strokes, dive off a block, and execute a legal turn. Give them enough water time and a halfway decent coach and they will get there. That part is not the hard part.

The hard part is what happens at yard 150 of a two hundred when the body starts lying to the mind and the mind believes it.

THE COLLISION OF BIOLOGY, PHYSICS AND MINDSET

There is a collision happening inside every competitive swimmer who has ever pushed past comfortable and kept going. It is the collision between what your biology is demanding, what the physics of the water requires, and what your mindset is prepared to do about it.

Your biology is ancient machinery built for survival. When oxygen debt climbs and your muscles are burning, your body fires every alarm it has. Slow down. Stop thinking. Abandon what you know. Protect yourself. This is the Exhaustion Reflex Instinct firing. It is not weakness. It is biology doing exactly what it was designed to do.

The problem is that the water does not care.

The wall does not move closer because your hips dropped. The clock does not slow because your arms are gone. Physics holds its position while biology screams. In that gap, in that exact moment between what your body is demanding and what the race requires, most swimmers are already lost before they know it happened.

Here is where the Exhaustion Reflex Instinct is recognized and defeated. But the skills to do just that must be cultivated through your program long before that moment arrives.

DO NOT MISTAKE THE INSTINCT FOR REALITY

The body says you are done and most swimmers believe it. The body is not reporting that you are done. The body is reporting that it is uncomfortable. Those are not the same thing.

The swimmer who has never been taught to recognize the Exhaustion Reflex Instinct will surrender to it every time and call it hitting a wall. The trained swimmer looks at that same moment and sees a classroom.

WHAT HAPPENS INSIDE THE COLLISION

When the Exhaustion Reflex Instinct fires, two things collapse fast. First the physical. Hips sink. Rotation dies. The stroke shortens into something that is technically swimming the way treading water with ambition is technically swimming.

Then the mental. Concentration does not fade gradually. It vanishes. The void that opens will fill with something. In the absence of trained intention that signal is almost always the wrong current. Bad juju. The voice that says you are done, they are passing you, this hurts too much. Eight out of ten swimmers start a race with positive internal dialogue then hit their pain threshold and go negative. That transition is where most races are actually decided.

THE RESPONSE YOU BUILD BEFORE YOU NEED IT

Intention is the weapon. The specific and chosen decision made before you get in the water about what you are going to pay attention to when the Exhaustion Reflex Instinct fires. Neutral self-talk is the anchor. Count the strokes. Watch the black line. Find the wall. These instruments hold awareness in the present moment when everything in your biology is pulling it somewhere safer.

THE COACHABILITY THRESHOLD

When your coach calls a correction mid-set and the swimmer actually hears it and makes the adjustment right then under maximum duress, that act repeated across a season wires adaptation deeper than a thousand comfortable repetitions ever will. Coachability under exhaustion is not a personality trait. It is a trainable skill.

WHEN THE RESULT DOES NOT COME YET

Sometimes you do everything right and the result does not come. You recognized the instinct. You chose your response. You executed. The result will come when the biology catches up to the mindset you are already building.

THREE STATEMENTS AFTER EVERY PRACTICE

What I held together when it got hard today.
What broke down.
What I work on tomorrow.

THE BOTTOM LINE

A swimmer must learn to be mentally and technically proficient while under intense physical duress to achieve any real greatness in this sport. The capacity to stay present, aware, coachable and intentional at the exact moment the Exhaustion Reflex Instinct is demanding the opposite — that is what separates the swimmer who reaches their potential from the one who wonders what they were capable of.

That capacity is built long before the race ever asks for it. So that when it does ask, the response is already loaded, already trained, already yours.

That is the Exhaustion Reflex Instinct Principle.

— Coach Chance
Shared by Phlip because the world needs more things that are true.`

async function callPhlip(system,msgs){
  const res=await fetch('/api/chat',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:900,system,messages:msgs}),
  });
  const json=await res.json();
  if(!res.ok) throw new Error(json.error?.message||'error');
  return json.content?.[0]?.text||'Something got in the water. Try again. Streamline on.';
}

function detectTags(text){
  const unlockMatch=text.match(/\[UNLOCK:(intro|crib|cheat|article)\]/);
  const hasCommunity=/\[COMMUNITY\]/.test(text);
  const clean=text.replace(/\[UNLOCK:(intro|crib|cheat|article)\]/g,'').replace(/\[COMMUNITY\]/g,'').trim();
  return{clean,unlock:unlockMatch?unlockMatch[1]:null,community:hasCommunity};
}

.wl-list{list-style:none;display:flex;flex-direction:column;gap:5px;}
.wl-list li{font-family:'Barlow',Arial,sans-serif;font-size:12.5px;color:rgba(255,255,255,0.6);line-height:1.55;padding-left:14px;position:relative;}
.wl-list li::before{content:'—';position:absolute;left:0;color:rgba(196,136,43,0.5);}
.wl-close{font-family:'DM Serif Display',Georgia,serif;font-style:italic;color:rgba(196,136,43,0.5);font-size:13px;margin-top:6px;line-height:1.6;text-align:center;}
.wl-footer{padding:14px 22px 20px;flex-shrink:0;border-top:1px solid rgba(196,136,43,0.1);}
.wl-btn{width:100%;background:#C4882B;border:none;color:#071E38;padding:15px;font-family:'Barlow Condensed',Arial,sans-serif;font-weight:800;font-size:13px;letter-spacing:5px;cursor:pointer;transition:background 0.15s;text-transform:uppercase;}
.wl-btn:hover{background:#D4A030;}

/* NAT DOORS */
.nat{flex:1;background:#071E38;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;user-select:none;position:relative;overflow:hidden;}
.nat-lanes{position:absolute;inset:0;background:repeating-linear-gradient(90deg,transparent,transparent 85px,rgba(196,136,43,0.06) 85px,rgba(196,136,43,0.06) 86px);pointer-events:none;}
.nat-over{font-family:'Barlow Condensed',Arial,sans-serif;font-weight:700;letter-spacing:10px;color:#C4882B;font-size:12px;margin-bottom:22px;position:relative;z-index:2;opacity:0.85;text-transform:uppercase;}
.door-wrap{width:216px;height:296px;display:flex;position:relative;z-index:2;perspective:900px;}
.door-cap{position:absolute;top:-13px;left:0;right:0;height:13px;background:linear-gradient(90deg,#3A2006,#7A5510,#4A2C08,#7A5510,#3A2006);border-radius:1px 1px 0 0;}
.dp{width:50%;height:100%;transform-style:preserve-3d;transition:transform 0.88s cubic-bezier(0.4,0,0.2,1);background:repeating-linear-gradient(180deg,rgba(0,0,0,0.05) 0,transparent 2px,transparent 38px,rgba(0,0,0,0.04) 38px,rgba(0,0,0,0.04) 41px),linear-gradient(115deg,#3A1E06 0%,#5A3210 18%,#381E04 32%,#58360E 52%,#3A1E06 68%,#664010 84%,#3A1E06 100%);border:1px solid #201004;}
.dp.dl{transform-origin:left center;border-right:none;}
.dp.dr{transform-origin:right center;border-left:1px solid rgba(130,90,15,0.3);}
.dp.dl.op{transform:rotateY(-83deg);}
.dp.dr.op{transform:rotateY(83deg);}
.di{position:absolute;top:9%;left:9%;right:9%;bottom:9%;border:1px solid rgba(196,136,43,0.14);}
.di::after{content:'';position:absolute;top:26%;left:7%;right:7%;bottom:26%;border:1px solid rgba(196,136,43,0.07);}
.dh{position:absolute;top:50%;transform:translateY(-50%);width:5px;height:24px;background:linear-gradient(90deg,#6A4A08,#C49020,#6A4A08);border-radius:3px;}
.dp.dl .dh{right:8px;}.dp.dr .dh{left:8px;}
.nat-glow{position:absolute;bottom:-3px;left:15%;right:15%;height:10px;background:rgba(0,160,210,0.4);border-radius:50%;filter:blur(4px);z-index:3;}
.nat-hint{font-family:'Barlow',Arial,sans-serif;font-style:italic;color:rgba(196,136,43,0.35);font-size:12px;margin-top:22px;position:relative;z-index:2;}

/* POOL */
.pool-screen{flex:1;position:relative;overflow:hidden;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.pool-water{position:absolute;inset:0;background:linear-gradient(180deg,#071E38 0%,#0A2845 40%,#0D3558 70%,#0A2845 100%);}
.pool-shimmer{position:absolute;inset:0;background:linear-gradient(125deg,transparent 30%,rgba(255,255,255,0.03) 50%,transparent 70%);animation:shimmer 4s ease-in-out infinite;}
.pool-lanes{position:absolute;inset:0;background:repeating-linear-gradient(90deg,transparent,transparent calc(12.5% - 1px),rgba(196,136,43,0.25) calc(12.5% - 1px),rgba(196,136,43,0.25) calc(12.5%));}
.pool-flag{position:absolute;top:0;left:0;right:0;height:3px;background:repeating-linear-gradient(90deg,#C4882B 0,#C4882B 16px,transparent 16px,transparent 20px,#1B2B45 20px,#1B2B45 36px,transparent 36px,transparent 40px);}
.pool-nums{position:absolute;top:18px;left:0;right:0;display:flex;}
.pool-num{flex:1;text-align:center;font-family:'Barlow Condensed',Arial,sans-serif;font-weight:700;font-size:11px;letter-spacing:1px;color:rgba(196,136,43,0.35);}
.pool-blocks{position:absolute;bottom:0;left:0;right:0;height:44px;display:flex;background:rgba(7,30,56,0.8);border-top:2px solid rgba(196,136,43,0.2);}
.pool-block{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;}
.pool-block-top{width:72%;height:12px;background:linear-gradient(180deg,#C4882B,#8B6010);animation:blockPulse 2.5s ease-in-out infinite;}
.pool-block-base{width:85%;height:6px;background:rgba(196,136,43,0.3);}
.pool-block:nth-child(even) .pool-block-top{animation-delay:0.4s;}
.pool-block:nth-child(3n) .pool-block-top{animation-delay:0.8s;}
.pool-content{position:relative;z-index:10;text-align:center;}
.pool-welcome{font-family:'DM Serif Display',Georgia,serif;font-style:italic;color:rgba(240,233,216,0.5);font-size:14px;letter-spacing:2px;margin-bottom:32px;animation:riseIn 1s ease both;}
.pool-divein{font-family:'Barlow Condensed',Arial,sans-serif;font-weight:800;font-size:52px;letter-spacing:8px;color:#C4882B;animation:pulse 2.2s ease-in-out infinite, riseIn 1s ease 0.3s both;text-shadow:0 0 40px rgba(196,136,43,0.3);}
.pool-tap{font-family:'Barlow',Arial,sans-serif;font-style:italic;color:rgba(240,233,216,0.2);font-size:12px;margin-top:24px;animation:riseIn 1s ease 0.6s both;}

/* TERMS */
.terms{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.terms-hdr{background:#071E38;padding:20px 18px 16px;flex-shrink:0;text-align:center;border-bottom:1px solid rgba(196,136,43,0.15);}
.terms-logo{font-family:'Barlow Condensed',Arial,sans-serif;font-weight:800;color:#C4882B;font-size:42px;letter-spacing:8px;text-transform:uppercase;display:block;line-height:1;}
.terms-tag{font-family:'DM Serif Display',Georgia,serif;font-style:italic;color:rgba(196,136,43,0.38);font-size:11px;margin-top:5px;}
.terms-body{flex:1;overflow-y:auto;padding:20px 22px 10px;}
.terms-title{font-family:'Barlow Condensed',Arial,sans-serif;font-weight:700;font-size:11px;letter-spacing:3px;color:#C4882B;text-transform:uppercase;margin-bottom:14px;}
.terms-p{font-family:'Barlow',Arial,sans-serif;font-size:13px;line-height:1.7;color:rgba(255,255,255,0.65);margin-bottom:12px;}
.terms-p strong{font-weight:600;color:rgba(255,255,255,0.88);}
.terms-footer{padding:14px 18px 18px;flex-shrink:0;border-top:1px solid rgba(196,136,43,0.1);}
.terms-btn{width:100%;background:#C4882B;border:none;color:#071E38;padding:15px;font-family:'Barlow Condensed',Arial,sans-serif;font-weight:800;font-size:13px;letter-spacing:4px;cursor:pointer;transition:background 0.15s;text-transform:uppercase;}
.terms-btn:hover{background:#D4A030;}

/* LANDING */
.landing{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.l-hdr{background:#071E38;padding:20px 20px 16px;flex-shrink:0;position:relative;overflow:hidden;border-bottom:1px solid rgba(196,136,43,0.15);}
.l-hdr::after{content:'';position:absolute;inset:0;background:repeating-linear-gradient(90deg,transparent,transparent 85px,rgba(196,136,43,0.04) 85px,rgba(196,136,43,0.04) 86px);pointer-events:none;}
.l-logo{font-family:'Barlow Condensed',Arial,sans-serif;font-weight:800;color:#C4882B;font-size:48px;letter-spacing:8px;line-height:1;display:block;position:relative;z-index:1;text-transform:uppercase;}
.l-tag{font-family:'Barlow',Arial,sans-serif;font-style:italic;color:rgba(196,136,43,0.75);font-size:11px;margin-top:5px;position:relative;z-index:1;}
.l-safety{padding:8px 20px;background:#0A2236;flex-shrink:0;border-bottom:1px solid rgba(196,136,43,0.08);}
.l-safety p{font-family:'Barlow',Arial,sans-serif;color:rgba(255,255,255,0.3);font-size:11px;line-height:1.55;}
.lanes-wrap{flex:1;overflow-y:auto;padding:0;background:#071E38;}
.lane{background:transparent;border-bottom:1px solid rgba(196,136,43,0.08);padding:18px 20px;cursor:pointer;display:flex;align-items:center;justify-content:space-between;transition:background 0.13s;position:relative;overflow:hidden;}
.lane::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:#C4882B;transform:scaleY(0);transition:transform 0.18s;transform-origin:center;}
.lane:hover{background:rgba(196,136,43,0.06);}
.lane:hover::before{transform:scaleY(1);}
.lane.sup::before{background:#A03030;}
.lane.sup:hover{background:rgba(160,48,48,0.06);}
.lane-label{font-family:'Barlow Condensed',Arial,sans-serif;font-weight:700;letter-spacing:2.5px;color:rgba(255,255,255,0.82);font-size:19px;line-height:1;text-transform:uppercase;}
.lane.sup .lane-label{color:rgba(224,160,160,0.8);letter-spacing:2px;font-size:17px;}
.lane-arrow{color:rgba(196,136,43,0.28);font-size:22px;flex-shrink:0;line-height:1;transition:color 0.13s,transform 0.13s;}
.lane:hover .lane-arrow{color:rgba(196,136,43,0.65);transform:translateX(3px);}
.lane.sup .lane-arrow{color:rgba(160,48,48,0.28);}
.lane.sup:hover .lane-arrow{color:rgba(160,48,48,0.6);}

/* CHAT */
.chat{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.c-hdr{background:#071E38;padding:9px 13px;display:flex;align-items:center;gap:11px;flex-shrink:0;border-bottom:1px solid rgba(196,136,43,0.2);position:relative;overflow:hidden;}
.c-hdr::after{content:'';position:absolute;inset:0;background:repeating-linear-gradient(90deg,transparent,transparent 85px,rgba(196,136,43,0.05) 85px,rgba(196,136,43,0.05) 86px);pointer-events:none;}
.back{background:none;border:none;color:rgba(196,136,43,0.7);font-size:28px;cursor:pointer;padding:0;line-height:1;flex-shrink:0;font-family:serif;position:relative;z-index:1;}
.c-hdr-name{font-family:'Barlow Condensed',Arial,sans-serif;font-weight:800;color:#C4882B;font-size:26px;letter-spacing:4px;line-height:1;text-transform:uppercase;position:relative;z-index:1;}
.c-hdr-lane{font-family:'Barlow',Arial,sans-serif;font-style:italic;color:rgba(196,136,43,0.38);font-size:10px;margin-top:2px;position:relative;z-index:1;}
.tabs{display:flex;background:#0A1E35;border-bottom:1px solid rgba(196,136,43,0.12);flex-shrink:0;}
.tab{flex:1;padding:10px 4px;font-family:'Barlow Condensed',Arial,sans-serif;font-weight:700;letter-spacing:1.5px;font-size:11px;color:rgba(255,255,255,0.3);background:none;border:none;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:color 0.13s,border-color 0.13s;text-transform:uppercase;}
.tab.on{color:#C4882B;border-bottom-color:#C4882B;}
.tab:hover:not(.on){color:rgba(255,255,255,0.55);}
.msgs{flex:1;overflow-y:auto;padding:13px 11px;display:flex;flex-direction:column;gap:10px;background:#071E38;}
.mu{align-self:flex-end;max-width:86%;background:#0D2840;color:rgba(255,255,255,0.88);padding:10px 14px;font-family:'Barlow',Arial,sans-serif;font-size:14px;line-height:1.6;border-bottom:2px solid rgba(196,136,43,0.4);}
.mp{align-self:flex-start;max-width:91%;background:#0A1E35;color:rgba(255,255,255,0.88);padding:12px 15px;font-family:'DM Serif Display',Georgia,serif;font-size:15px;line-height:1.72;border-left:3px solid #C4882B;}
.me{align-self:flex-start;max-width:91%;background:rgba(160,48,48,0.12);color:rgba(224,160,160,0.9);padding:10px 14px;font-family:'DM Serif Display',Georgia,serif;font-style:italic;font-size:14px;border-left:3px solid rgba(160,48,48,0.6);}
.typing{align-self:flex-start;display:flex;gap:5px;padding:13px 15px;background:#0A1E35;border-left:3px solid #C4882B;}
.dot{width:7px;height:7px;background:#C4882B;border-radius:50%;animation:tdot 1.2s infinite;}
.dot:nth-child(2){animation-delay:.15s}.dot:nth-child(3){animation-delay:.3s}
.unlock-btn{align-self:flex-start;margin-top:-4px;background:rgba(196,136,43,0.12);border:1px solid rgba(196,136,43,0.3);color:#C4882B;padding:8px 14px;font-family:'Barlow Condensed',Arial,sans-serif;font-weight:700;font-size:10px;letter-spacing:2px;cursor:pointer;transition:all 0.14s;display:flex;align-items:center;gap:7px;text-transform:uppercase;}
.unlock-btn:hover{background:rgba(196,136,43,0.2);border-color:rgba(196,136,43,0.5);}
.unlock-dot{width:6px;height:6px;background:#C4882B;border-radius:50%;opacity:0.7;}
.community-card{align-self:flex-start;width:100%;max-width:91%;background:rgba(196,136,43,0.06);border:1px solid rgba(196,136,43,0.15);padding:14px 16px;margin-top:4px;}
.cc-title{font-family:'Barlow Condensed',Arial,sans-serif;font-weight:700;font-size:11px;letter-spacing:2px;color:rgba(196,136,43,0.6);text-transform:uppercase;margin-bottom:6px;}
.cc-text{font-family:'DM Serif Display',Georgia,serif;font-style:italic;color:rgba(255,255,255,0.5);font-size:13px;line-height:1.6;margin-bottom:10px;}
.cc-btn{background:none;border:1px solid rgba(196,136,43,0.25);color:rgba(196,136,43,0.55);padding:6px 12px;font-family:'Barlow Condensed',Arial,sans-serif;font-weight:700;font-size:10px;letter-spacing:2px;cursor:pointer;transition:all 0.13s;text-transform:uppercase;}
.cc-btn:hover{border-color:rgba(196,136,43,0.45);color:rgba(196,136,43,0.8);}
.inp-area{padding:8px 11px;background:#0A1E35;display:flex;gap:6px;flex-shrink:0;border-top:1px solid rgba(196,136,43,0.1);}
.inp{flex:1;border:1px solid rgba(196,136,43,0.18);background:#071E38;padding:10px 12px;font-family:'DM Serif Display',Georgia,serif;font-style:italic;font-size:14px;color:rgba(255,255,255,0.82);outline:none;resize:none;height:44px;line-height:1.4;}
.inp::placeholder{color:rgba(255,255,255,0.2);}
.inp:focus{border-color:rgba(196,136,43,0.4);}
.send{background:#C4882B;border:none;color:#071E38;padding:0 15px;font-family:'Barlow Condensed',Arial,sans-serif;font-weight:800;font-size:11px;letter-spacing:2px;cursor:pointer;transition:background 0.13s;flex-shrink:0;text-transform:uppercase;}
.send:hover:not(:disabled){background:#D4A030;}
.send:disabled{opacity:0.3;cursor:not-allowed;}
.sit-list{flex:1;overflow-y:auto;padding:8px 11px 14px;background:#071E38;display:flex;flex-direction:column;gap:5px;}
.sit-intro{font-family:'DM Serif Display',Georgia,serif;font-style:italic;color:rgba(255,255,255,0.28);font-size:12px;padding:6px 4px 6px;line-height:1.65;}
.sit{background:#0A1E35;padding:12px 14px;cursor:pointer;border-left:2px solid rgba(196,136,43,0.18);display:flex;align-items:center;justify-content:space-between;transition:background 0.12s,border-left-color 0.12s;}
.sit:hover{background:#0D2840;border-left-color:#C4882B;}
.sit-txt{font-family:'Barlow',Arial,sans-serif;font-size:14px;color:rgba(255,255,255,0.72);font-weight:500;}
.sit-ch{color:rgba(196,136,43,0.35);font-size:20px;flex-shrink:0;}
.pool-tab{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.block-wrap{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#071E38;position:relative;overflow:hidden;padding:20px;}
.block-lanes{position:absolute;inset:0;background:repeating-linear-gradient(90deg,transparent,transparent 85px,rgba(196,136,43,0.06) 85px,rgba(196,136,43,0.06) 86px);pointer-events:none;}
.block-flag{position:absolute;top:0;left:0;right:0;height:3px;background:repeating-linear-gradient(90deg,#C4882B 0,#C4882B 16px,transparent 16px,transparent 20px,#1B2B45 20px,#1B2B45 36px,transparent 36px,transparent 40px);}
.block-title{font-family:'Barlow Condensed',Arial,sans-serif;font-weight:800;letter-spacing:6px;font-size:26px;color:#C4882B;text-transform:uppercase;margin-bottom:3px;position:relative;z-index:2;}
.block-sub{font-family:'Barlow',Arial,sans-serif;font-style:italic;color:rgba(255,255,255,0.65);font-size:13px;margin-bottom:22px;position:relative;z-index:2;}
.block-lights{display:flex;gap:10px;justify-content:center;margin-bottom:18px;position:relative;z-index:2;}
.bl{width:24px;height:24px;border-radius:50%;background:#0A1E35;border:2px solid rgba(196,136,43,0.2);transition:background 0.05s;}
.bl.yellow{background:#C4882B;border-color:#C4882B;}
.bl.green{background:#2ECC71;border-color:#2ECC71;}
.bl.red{background:#E74C3C;border-color:#E74C3C;}
.block-status{font-family:'Barlow Condensed',Arial,sans-serif;font-weight:700;font-size:22px;letter-spacing:3px;color:rgba(255,255,255,0.95);text-transform:uppercase;margin-bottom:18px;min-height:30px;position:relative;z-index:2;text-align:center;}
.block-btn{background:#C4882B;border:none;color:#071E38;padding:14px 44px;font-family:'Barlow Condensed',Arial,sans-serif;font-weight:800;font-size:17px;letter-spacing:4px;cursor:pointer;text-transform:uppercase;position:relative;z-index:2;transition:background 0.1s;}
.block-btn:hover{background:#D4A030;}
.block-result{background:#0A1E35;border-left:3px solid #C4882B;padding:16px 18px;width:100%;max-width:290px;position:relative;z-index:2;}
.br-label{font-family:'Barlow Condensed',Arial,sans-serif;font-size:10px;letter-spacing:3px;color:rgba(196,136,43,0.7);text-transform:uppercase;margin-bottom:3px;}
.br-time{font-family:'Barlow Condensed',Arial,sans-serif;font-weight:800;font-size:40px;color:#C4882B;letter-spacing:2px;line-height:1;margin-bottom:10px;}
.br-phlip{font-family:'DM Serif Display',Georgia,serif;font-style:italic;color:rgba(255,255,255,0.88);font-size:14px;line-height:1.68;margin-bottom:10px;}
.br-pb{font-family:'Barlow Condensed',Arial,sans-serif;font-size:11px;letter-spacing:2px;color:rgba(196,136,43,0.65);text-transform:uppercase;margin-bottom:12px;}
.br-pb span{color:#C4882B;font-weight:700;}
.br-again{background:none;border:1px solid rgba(196,136,43,0.35);color:rgba(196,136,43,0.85);padding:8px 20px;font-family:'Barlow Condensed',Arial,sans-serif;font-weight:700;font-size:11px;letter-spacing:3px;cursor:pointer;text-transform:uppercase;transition:all 0.13s;}
.br-again:hover{border-color:#C4882B;color:#C4882B;}

/* FEEDBACK */
.fb-wrap{position:absolute;bottom:60px;right:11px;z-index:50;}
.fb-toggle{background:rgba(196,136,43,0.12);border:1px solid rgba(196,136,43,0.25);color:rgba(196,136,43,0.6);width:32px;height:32px;border-radius:50%;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.14s;}
.fb-toggle:hover{background:rgba(196,136,43,0.2);color:#C4882B;}
.fb-form{position:absolute;bottom:40px;right:0;width:260px;background:#0A1E35;border:1px solid rgba(196,136,43,0.2);padding:16px;animation:riseIn 0.2s ease;}
.fb-title{font-family:'Barlow Condensed',Arial,sans-serif;font-weight:700;font-size:11px;letter-spacing:2px;color:#C4882B;text-transform:uppercase;margin-bottom:12px;}
.fb-q{font-family:'Barlow',Arial,sans-serif;font-size:11px;color:rgba(255,255,255,0.5);margin-bottom:4px;}
.fb-inp{width:100%;background:#071E38;border:1px solid rgba(196,136,43,0.15);padding:7px 9px;font-family:'Barlow',Arial,sans-serif;font-size:12px;color:rgba(255,255,255,0.75);outline:none;resize:none;margin-bottom:9px;}
.fb-inp:focus{border-color:rgba(196,136,43,0.35);}
.fb-row{display:flex;gap:6px;margin-bottom:9px;}
.fb-yn{flex:1;background:none;border:1px solid rgba(196,136,43,0.2);color:rgba(255,255,255,0.5);padding:6px;font-family:'Barlow Condensed',Arial,sans-serif;font-weight:700;font-size:10px;letter-spacing:1px;cursor:pointer;transition:all 0.13s;text-transform:uppercase;}
.fb-yn.sel,.fb-yn:hover{background:rgba(196,136,43,0.15);border-color:rgba(196,136,43,0.4);color:#C4882B;}
.fb-send{width:100%;background:#C4882B;border:none;color:#071E38;padding:8px;font-family:'Barlow Condensed',Arial,sans-serif;font-weight:800;font-size:10px;letter-spacing:3px;cursor:pointer;transition:background 0.13s;text-transform:uppercase;}
.fb-send:hover{background:#D4A030;}
.fb-thanks{font-family:'DM Serif Display',Georgia,serif;font-style:italic;color:rgba(196,136,43,0.6);font-size:13px;text-align:center;padding:8px 0;}

/* MODAL */
.modal-bg{position:absolute;inset:0;background:rgba(7,30,56,0.85);z-index:100;display:flex;align-items:flex-end;}
.modal{background:#071E38;width:100%;max-height:88%;display:flex;flex-direction:column;border-top:2px solid #C4882B;}
.modal-hdr{background:#0A1E35;padding:14px 16px;display:flex;align-items:flex-start;justify-content:space-between;flex-shrink:0;border-bottom:1px solid rgba(196,136,43,0.15);}
.modal-title{font-family:'Barlow Condensed',Arial,sans-serif;font-weight:800;color:#C4882B;font-size:18px;letter-spacing:2px;text-transform:uppercase;line-height:1.2;}
.modal-sub{font-family:'Barlow',Arial,sans-serif;font-style:italic;color:rgba(196,136,43,0.38);font-size:11px;margin-top:3px;}
.modal-close{background:none;border:none;color:rgba(196,136,43,0.45);font-size:26px;cursor:pointer;line-height:1;padding:0;flex-shrink:0;margin-left:12px;}
.modal-body{flex:1;overflow-y:auto;padding:18px 16px;}
.modal-body pre{font-family:'Barlow',Arial,sans-serif;font-size:13px;line-height:1.78;color:rgba(255,255,255,0.72);white-space:pre-wrap;word-wrap:break-word;}
`;

function App(){
  const [screen,   setScreen]  =useState('welcome');
  const [natOpen,  setNatOpen] =useState(false);
  const [laneId,   setLaneId]  =useState(null);
  const [tab,      setTab]     =useState('talk');
  const [talkMsgs, setTalkMsgs]=useState([]);
  const [poolMsgs, setPoolMsgs]=useState([]);
  const [input,    setInput]   =useState('');
  const [loading,  setLoading] =useState(false);
  const [earned,   setEarned]  =useState(new Set());
  const [showModal,setShowModal]=useState(null);
  const [showFb,   setShowFb]  =useState(false);
  const [fbDone,   setFbDone]  =useState(false);
  const [fb1,      setFb1]     =useState('');
  const [fb2,      setFb2]     =useState('');
  const [fb3,      setFb3]     =useState('');
  const [communityShown,setCommunityShown]=useState(false);
  const talkEnd=useRef(null);
  const poolEnd=useRef(null);

  const activeMsgs   =tab==='pool'?poolMsgs:talkMsgs;
  const setActiveMsgs=tab==='pool'?setPoolMsgs:setTalkMsgs;
  const activeEnd    =tab==='pool'?poolEnd:talkEnd;

  useEffect(()=>{activeEnd.current?.scrollIntoView({behavior:'smooth'});},[activeMsgs,loading,tab]);

  const openNat=()=>{
    if(natOpen) return;
    setNatOpen(true);
    setTimeout(()=>setScreen('pool'),920);
  };

  const enterChat=(id)=>{
    setLaneId(id);setTalkMsgs([]);setPoolMsgs([]);
    setInput('');setTab('talk');setEarned(new Set());
    setCommunityShown(false);
    setScreen('chat');
    setTimeout(()=>sendOpener(id),100);
  };

  const sendOpener=async(id)=>{
    setLoading(true);
    try{
      const prompt=id==='parent'
        ?'Open warmly as Phlip to a swim parent or supporter. Two or three sentences and one question. Use Rents warmly if it feels right.'
        :'Open this conversation with your natural voice. One of your openers. Two sentences and one question to find where they are today.';
      const raw=await callPhlip(getSystem(id),[{role:'user',content:prompt}]);
      const{clean,unlock}=detectTags(raw);
      setTalkMsgs([{who:'phlip',text:clean,unlock:unlock&&!earned.has(unlock)?unlock:null}]);
      if(unlock&&!earned.has(unlock)) setEarned(p=>new Set([...p,unlock]));
    }catch{
      setTalkMsgs([{who:'err',text:'Something got in the water. Try again. Streamline on.'}]);
    }finally{setLoading(false);}
  };

  const sendPoolOpener=async()=>{
    setLoading(true);
    try{
      const raw=await callPhlip(getPoolSystem(),[{role:'user',content:'Open the conversation. Invite me to ask about the history of the sport and the great swimmers and coaches. Two or three sentences, warm, from the deck.'}]);
      const{clean}=detectTags(raw);
      setPoolMsgs([{who:'phlip',text:clean}]);
    }catch{
      setPoolMsgs([{who:'err',text:'Something got in the water. Try again. Streamline on.'}]);
    }finally{setLoading(false);}
  };

  const switchTab=(t)=>{
    setTab(t);
    if(t==='pool'&&poolMsgs.length===0&&!loading) sendPoolOpener();
  };

  const send=async(msg)=>{
    if(!msg.trim()||loading) return;
    const prev=tab==='pool'?poolMsgs:talkMsgs;
    const next=[...prev,{who:'user',text:msg}];
    setActiveMsgs(next);setInput('');setLoading(true);
    const sys=tab==='pool'?getPoolSystem():getSystem(laneId);
    try{
      const apiMsgs=next.map(m=>({role:m.who==='phlip'?'assistant':'user',content:m.text}));
      const raw=await callPhlip(sys,apiMsgs);
      const{clean,unlock,community}=detectTags(raw);
      const newMsg={
        who:'phlip',text:clean,
        unlock:unlock&&!earned.has(unlock)?unlock:null,
        community:community&&!communityShown&&tab==='talk',
      };
      if(unlock&&!earned.has(unlock)) setEarned(p=>new Set([...p,unlock]));
      if(community&&!communityShown&&tab==='talk') setCommunityShown(true);
      setActiveMsgs([...next,newMsg]);
    }catch{
      setActiveMsgs([...next,{who:'err',text:'Something got in the water. Try again. Streamline on.'}]);
    }finally{setLoading(false);}
  };

  const submitFeedback=async()=>{
    try{
      await fetch('/',{
        method:'POST',
        headers:{'Content-Type':'application/x-www-form-urlencoded'},
        body:new URLSearchParams({'form-name':'phlip-feedback','q1':fb1,'q2':fb2,'q3':fb3}).toString(),
      });
    }catch{}
    setFbDone(true);
  };

  const tapSit=(msg)=>{setTab('talk');setTimeout(()=>send(msg),80);};
  const onKey=(e)=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send(input);}};
  const lane=LANES.find(l=>l.id===laneId);

  return(
    <>
      <style>{S}</style>
      <div className="app">

        {/* WELCOME */}
        {screen==='welcome'&&(
          <div className="welcome">
            <div className="wl-hdr">
              <div className="wl-logo">Phlip</div>
              <div className="wl-tag">The one old swimmer you can always question</div>
            </div>
            <div className="wl-body">
              <div className="wl-section">
                <div className="wl-section-title">Welcome to Beta 1.0</div>
                <p className="wl-p">You are one of the first people to step on this deck. Phlip is a swim companion built around a lifetime in the sport, real coaching philosophy, and a framework called the Exhaustion Reflex Instinct Principle developed by Coach Chance. He is not a coach. He is not a therapist. He is the old swimmer who has been where you are and never stopped caring about where you are going.</p>
                <p className="wl-p">This is beta. It is real and it works and it is not finished. Your experience and your feedback are how it gets better.</p>
              </div>
              <div className="wl-section">
                <div className="wl-section-title">What Is Here Now</div>
                <ul className="wl-list">
                  <li>Six lanes: 9 and Under, 10 to 14, 15 to 18, College, Masters, and the Swim Supporter Zone for parents</li>
                  <li>Three tabs in every lane: Talk, Situations, and The Pool for sport history</li>
                  <li>Full system prompts tuned to each swimmer type and age</li>
                  <li>Earned content that unlocks through genuine conversation depth</li>
                  <li>The Exhaustion Reflex Instinct Principle woven throughout</li>
                  <li>Complete safety guardrails and legal redirects</li>
                </ul>
              </div>
              <div className="wl-section">
                <div className="wl-section-title">Coming in 2.0</div>
                <ul className="wl-list">
                  <li>Practice journal with date stamps and Phlip referencing past entries</li>
                  <li>Season intention that Phlip returns to at key moments</li>
                  <li>Team mode with a coach portal and aggregate swimmer insights</li>
                  <li>Weekly check in prompts to keep the habit alive</li>
                  <li>Parent and swimmer linked accounts</li>
                  <li>Push notifications timed to meets and taper</li>
                  <li>Multilingual starting with Spanish</li>
                  <li>COPPA compliance for swimmers under 13</li>
                </ul>
              </div>
              <div className="wl-section">
                <div className="wl-section-title">What We Need From You</div>
                <ul className="wl-list">
                  <li>Talk to Phlip every day for two weeks</li>
                  <li>Try every lane including the Swim Supporter Zone</li>
                  <li>Hit the Situations list and push him into corners</li>
                  <li>Try to break him and tell us where he cracks</li>
                  <li>Use the feedback button inside the app anytime</li>
                </ul>
              </div>
              <p className="wl-close">Phlip was built out of love for the sport and love for the people in it. Why Knot.</p>
            </div>
            <div className="wl-footer">
              <button className="wl-btn" onClick={()=>setScreen('nat')}>Streamline On — Let's Go</button>
            </div>
          </div>
        )}

        {/* NAT DOORS */}
        {screen==='nat'&&(
          <div className="nat" onClick={openNat}>
            <div className="nat-lanes"/>
            <div className="nat-over">Natatorium</div>
            <div className="door-wrap">
              <div className="door-cap"/>
              <div className={`dp dl${natOpen?' op':''}`}><div className="di"/><div className="dh"/></div>
              <div className={`dp dr${natOpen?' op':''}`}><div className="di"/><div className="dh"/></div>
              <div className="nat-glow"/>
            </div>
            <div className="nat-hint">Tap to enter</div>
          </div>
        )}

        {/* POOL */}
        {screen==='pool'&&(
          <div className="pool-screen" onClick={()=>setScreen('terms')}>
            <div className="pool-water"/>
            <div className="pool-shimmer"/>
            <div className="pool-lanes"/>
            <div className="pool-flag"/>
            <div className="pool-nums">
              {[1,2,3,4,5,6,7,8].map(n=><div key={n} className="pool-num">{n}</div>)}
            </div>
            <div className="pool-content">
              <div className="pool-welcome">Welcome</div>
              <div className="pool-divein">DIVE IN</div>
              <div className="pool-tap">tap anywhere to enter</div>
            </div>
            <div className="pool-blocks">
              {[...Array(8)].map((_,i)=>(
                <div key={i} className="pool-block">
                  <div className="pool-block-top"/>
                  <div className="pool-block-base"/>
                </div>
              ))}
            </div>
          </div>
        )}

        {/* TERMS */}
        {screen==='terms'&&(
          <div className="terms">
            <div className="terms-hdr">
              <span className="terms-logo">Phlip</span>
              <div className="terms-tag">The one old swimmer you can always question</div>
            </div>
            <div className="terms-body">
              <div className="terms-title">Before You Step On Deck</div>
              <p className="terms-p">Phlip is a <strong>swim companion</strong>, not a coach, therapist, counselor, or medical professional. He is here for the mental and emotional side of competitive swimming.</p>
              <p className="terms-p">Phlip <strong>never replaces your coach</strong>. Anything technical belongs with the person who can actually see you in the water.</p>
              <p className="terms-p">If anything serious comes up, Phlip will point you to someone who can actually help. In the US you can always text or call <strong>988</strong> for free confidential crisis support.</p>
              <p className="terms-p">Swimmers <strong>under 13</strong> should have a parent or guardian present or aware when using this app.</p>
              <p className="terms-p">By continuing you understand that Phlip is a swim companion and not a substitute for professional support, medical advice, or coaching.</p>
            </div>
            <div className="terms-footer">
              <button className="terms-btn" onClick={()=>setScreen('landing')}>I Understand — Let's Go</button>
            </div>
          </div>
        )}

        {/* LANDING */}
        {screen==='landing'&&(
          <div className="landing">
            <div className="l-hdr">
              <span className="l-logo">Phlip</span>
              <div className="l-tag">The one old swimmer you can always question</div>
            </div>
            <div className="l-safety">
              <p>Not a coach, not a counselor. A trusted companion. Always here.</p>
            </div>
            <div className="lanes-wrap">
              {LANES.map(l=>(
                <div key={l.id} className={`lane${l.sup?' sup':''}`} onClick={()=>enterChat(l.id)}>
                  <div className="lane-label">{l.label}</div>
                  <div className="lane-arrow">›</div>
                </div>
              ))}
            </div>
          </div>
        )}

        {/* CHAT */}
        {screen==='chat'&&(
          <div className="chat">
            <div className="c-hdr">
              <button className="back" onClick={()=>setScreen('landing')}>‹</button>
              <div>
                <div className="c-hdr-name">Phlip</div>
                <div className="c-hdr-lane">{lane?.label}</div>
              </div>
            </div>
            <div className="tabs">
              <button className={`tab${tab==='talk'?' on':''}`} onClick={()=>setTab('talk')}>Talk</button>
              <button className={`tab${tab==='situations'?' on':''}`} onClick={()=>setTab('situations')}>Situations</button>
              <button className={`tab${tab==='pool'?' on':''}`} onClick={()=>switchTab('pool')}>The Pool</button>
              <button className={`tab${tab==='block'?' on':''}`} onClick={()=>setTab('block')}>The Block</button>
            </div>

            {tab==='talk'&&(
              <>
                <div className="msgs">
                  {talkMsgs.map((m,i)=>(
                    <React.Fragment key={i}>
                      <div className={m.who==='user'?'mu':m.who==='err'?'me':'mp'}>{m.text}</div>
                      {m.unlock&&UNLOCKS[m.unlock]&&(
                        <button className="unlock-btn" onClick={()=>setShowModal(m.unlock)}>
                          <div className="unlock-dot"/><div className="unlock-dot"/><div className="unlock-dot"/>
                          Phlip's got something for you
                        </button>
                      )}
                      {m.community&&(
                        <div className="community-card">
                          <div className="cc-title">Still in the water</div>
                          <div className="cc-text">There are other swimmers in this water. When you are ready.</div>
                          <button className="cc-btn" onClick={()=>{}}>I'm in</button>
                        </div>
                      )}
                    </React.Fragment>
                  ))}
                  {loading&&<div className="typing"><div className="dot"/><div className="dot"/><div className="dot"/></div>}
                  <div ref={talkEnd}/>
                </div>
                <div className="inp-area">
                  <textarea className="inp" value={input} onChange={e=>setInput(e.target.value)} onKeyDown={onKey} placeholder="Talk to Phlip" disabled={loading}/>
                  <button className="send" onClick={()=>send(input)} disabled={loading||!input.trim()}>Send</button>
                </div>
              </>
            )}

            {tab==='situations'&&(
              <div className="sit-list">
                <div className="sit-intro">Where are you right now. Tap one and Phlip picks it up from there.</div>
                {(SITS[laneId]||SITS.middle).map((s,i)=>(
                  <div key={i} className="sit" onClick={()=>tapSit(s.m)}>
                    <span className="sit-txt">{s.l}</span>
                    <span className="sit-ch">›</span>
                  </div>
                ))}
              </div>
            )}

            {tab==='block'&&(
              <BlockGame/>
            )}

            {tab==='pool'&&(
              <div className="pool-tab">
                <div className="msgs">
                  {poolMsgs.map((m,i)=>(
                    <div key={i} className={m.who==='user'?'mu':m.who==='err'?'me':'mp'}>{m.text}</div>
                  ))}
                  {loading&&<div className="typing"><div className="dot"/><div className="dot"/><div className="dot"/></div>}
                  <div ref={poolEnd}/>
                </div>
                <div className="inp-area">
                  <textarea className="inp" value={input} onChange={e=>setInput(e.target.value)} onKeyDown={onKey} placeholder="Ask about the sport, the greats, the history" disabled={loading}/>
                  <button className="send" onClick={()=>send(input)} disabled={loading||!input.trim()}>Send</button>
                </div>
              </div>
            )}

            {/* FEEDBACK BUTTON */}
            <div className="fb-wrap">
              <button className="fb-toggle" onClick={()=>setShowFb(!showFb)} title="Feedback">?</button>
              {showFb&&(
                <div className="fb-form">
                  <div className="fb-title">Tell Phlip</div>
                  {fbDone?(
                    <div className="fb-thanks">Thank you. Streamline on.</div>
                  ):(
                    <>
                      <div className="fb-q">What surprised you about Phlip today</div>
                      <textarea className="fb-inp" rows={2} value={fb1} onChange={e=>setFb1(e.target.value)} placeholder="Anything..."/>
                      <div className="fb-q">What felt off or missing</div>
                      <textarea className="fb-inp" rows={2} value={fb2} onChange={e=>setFb2(e.target.value)} placeholder="Be direct..."/>
                      <div className="fb-q">Would you recommend Phlip to a swimmer you care about</div>
                      <div className="fb-row">
                        <button className={`fb-yn${fb3==='yes'?' sel':''}`} onClick={()=>setFb3('yes')}>Yes</button>
                        <button className={`fb-yn${fb3==='no'?' sel':''}`} onClick={()=>setFb3('no')}>Not yet</button>
                      </div>
                      <button className="fb-send" onClick={submitFeedback}>Send it</button>
                    </>
                  )}
                </div>
              )}
            </div>
          </div>
        )}

        {/* UNLOCK MODAL */}
        {showModal&&UNLOCKS[showModal]&&(
          <div className="modal-bg" onClick={()=>setShowModal(null)}>
            <div className="modal" onClick={e=>e.stopPropagation()}>
              <div className="modal-hdr">
                <div>
                  <div className="modal-title">{UNLOCKS[showModal].title}</div>
                  <div className="modal-sub">{UNLOCKS[showModal].sub}</div>
                </div>
                <button className="modal-close" onClick={()=>setShowModal(null)}>×</button>
              </div>
              <div className="modal-body">
                <pre>{UNLOCKS[showModal].body}</pre>
              </div>
            </div>
          </div>
        )}

      </div>

      {/* NETLIFY FORM (hidden, enables form submissions) */}
      <form name="phlip-feedback" data-netlify="true" hidden>
        <input name="q1"/><input name="q2"/><input name="q3"/>
      </form>
    </>
  );
}

function BlockGame(){
  const [gs,setGs]=React.useState('idle');
  const [lights,setLights]=React.useState([0,0,0,0,0]);
  const [status,setStatus]=React.useState('Ready?');
  const [result,setResult]=React.useState(null);
  const [pb,setPb]=React.useState(null);
  const gref=React.useRef({});

  function phlipSays(ms){
    if(ms<0) return "False start Swimmer. The instinct fired before the signal. That is the Exhaustion Reflex Instinct in its purest form. Now you know what to train.";
    if(ms<120) return "That is elite. Sub one twenty. Your body already knew what to do. You just got out of its way.";
    if(ms<160) return "Championship reaction Swimmer. You were present and ready and it showed.";
    if(ms<200) return "Solid. Under two hundred. Most swimmers never get there. Keep coming back to this.";
    if(ms<250) return "That is a good start. The block rewards practice. Same time tomorrow.";
    if(ms<350) return "You were in your head a little. That gap between the signal and the move is exactly where we work.";
    return "The body hesitated. Not a problem. That is just information. Now you know where to start. Why Knot?";
  }

  function clearT(){Object.values(gref.current).forEach(clearTimeout);gref.current={};}

  function startGame(){
    clearT();setGs('countdown');setLights([0,0,0,0,0]);setResult(null);setStatus('On your mark...');
    let l=[0,0,0,0,0];
    [0,1,2,3,4].forEach(i=>{
      gref.current['l'+i]=setTimeout(()=>{
        l=[...l];l[i]=1;setLights([...l]);
        if(i===4){
          const d=600+Math.random()*1400;
          gref.current['green']=setTimeout(()=>{
            setLights([2,2,2,2,2]);setStatus('GO!');setGs('green');
            gref.current['greenTime']=Date.now();
            gref.current['miss']=setTimeout(()=>{setGs('done');setStatus('TOO SLOW');setResult({ms:999,false:false});},2000);
          },d);
        }
      },800*(i+1));
    });
  }

  function handleTap(){
    if(gs==='idle'){startGame();return;}
    if(gs==='countdown'){
      clearT();setLights([3,3,3,3,3]);setGs('done');setStatus('FALSE START');setResult({ms:-1,false:true});return;
    }
    if(gs==='green'){
      clearT();
      const ms=Date.now()-gref.current['greenTime'];
      setGs('done');setStatus('REACTION TIME');setLights([0,0,0,0,0]);
      setResult({ms,false:false});
      if(pb===null||ms<pb) setPb(ms);
    }
  }

  function reset(){clearT();setGs('idle');setLights([0,0,0,0,0]);setStatus('Ready?');setResult(null);}
  const lc=l=>{if(l===0)return 'bl';if(l===1)return 'bl yellow';if(l===2)return 'bl green';return 'bl red';};

  return(
    <div className="block-wrap" onClick={!result?handleTap:undefined}>
      <div className="block-lanes"/>
      <div className="block-flag"/>
      <div className="block-title">The Block</div>
      <div className="block-sub">React after the green. Not before.</div>
      <div className="block-lights">{lights.map((l,i)=><div key={i} className={lc(l)}/>)}</div>
      <div className="block-status">{status}</div>
      {!result&&(
        <button className="block-btn" onClick={handleTap}>
          {gs==='idle'?'START':gs==='countdown'?'WAIT...':gs==='green'?'TAP!':''}
        </button>
      )}
      {result&&(
        <div className="block-result">
          <div className="br-label">{result.false?'false start':result.ms>=999?'missed':'seconds'}</div>
          <div className="br-time">{result.false?'FALSE':result.ms>=999?'2.00+':(result.ms/1000).toFixed(3)}</div>
          <div className="br-phlip">{phlipSays(result.false?-1:result.ms)}</div>
          {pb&&!result.false&&result.ms<999&&<div className="br-pb">Personal best <span>{(pb/1000).toFixed(3)}s</span></div>}
          <button className="br-again" onClick={e=>{e.stopPropagation();reset();}}>Again</button>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
