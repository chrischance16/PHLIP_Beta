// ─── STORAGE ───────────────────────────────────────────────────────────────
function getSeen(){try{return localStorage.getItem(SEEN_KEY)==='1';}catch{return false;}}
function markSeen(){try{localStorage.setItem(SEEN_KEY,'1');}catch{}}
function saveMsgs(msgs){try{localStorage.setItem(WATER_KEY,JSON.stringify(msgs.slice(-MAX_SAVED)));}catch{}}
function loadMsgs(){try{const d=localStorage.getItem(WATER_KEY);return d?JSON.parse(d):null;}catch{return null;}}
function clearMsgs(){try{localStorage.removeItem(WATER_KEY);}catch{}}
function loadDeck(){try{const d=localStorage.getItem(DECK_KEY);return d?JSON.parse(d):{}}catch{return {};}}
function saveDeck(d){try{localStorage.setItem(DECK_KEY,JSON.stringify(d));}catch{}}

// ─── UNLOCK / TAG DETECTION ─────────────────────────────────────────────────
function detectTags(text){
  const unlockMatch=text.match(/\[UNLOCK:(intro|crib|cheat|article)\]/);
  const hasCommunity=/\[COMMUNITY\]/.test(text);
  const clean=text.replace(/\[UNLOCK:(intro|crib|cheat|article)\]/g,'').replace(/\[COMMUNITY\]/g,'').trim();
  return{clean,unlock:unlockMatch?unlockMatch[1]:null,community:hasCommunity};
}

// ─── API CALL ───────────────────────────────────────────────────────────────
async function callPhlip(system,msgs){
  const res=await fetch('/api/chat',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:900,system,messages:msgs}),
  });
  const json=await res.json();
  if(!res.ok) throw new Error(json.error?.message||'error');
  return json.content?.[0]?.text||'Something got in the water. Try again. Streamline on.';
}

// ─── SHARE ──────────────────────────────────────────────────────────────────
function buildShareText(msgs){
  const lines=msgs
    .filter(m=>m.who==='phlip'||m.who==='user')
    .slice(-10)
    .map(m=>(m.who==='user'?'Me: ':'Phlip: ')+m.text)
    .join('\n\n');
  return `A conversation with Phlip\n\nphlip.online\n\n${lines}`;
}

// ─── PPIL DECK DATA ─────────────────────────────────────────────────────────
function getDeckDefaults(){
  return{
    setup:false,
    goalDays:30,
    startDate:null,
    days:{},           // {dateStr: {intentional:bool, intentionSet:str, intentionHeld:null|'yes'|'partial'|'no'}}
    streak:0,
    bestStreak:0,
    lastLogDate:null,
    swimmerType:null,  // filled by triage
  };
}

function getDeckStats(deck){
  if(!deck.startDate) return{score:0,color:'empty',streak:0,bestStreak:0,intentional:0,total:0,intentionAccuracy:0};
  const days=Object.values(deck.days);
  const total=days.length;
  if(total===0) return{score:0,color:'empty',streak:deck.streak||0,bestStreak:deck.bestStreak||0,intentional:0,total:0,intentionAccuracy:0};
  const intentional=days.filter(d=>d.intentional).length;
  const score=total>0?Math.round((intentional/total)*100):0;
  const withIntent=days.filter(d=>d.intentionSet&&d.intentionHeld);
  const intentionAccuracy=withIntent.length>0?Math.round((withIntent.filter(d=>d.intentionHeld==='yes'||d.intentionHeld==='partial').length/withIntent.length)*100):0;
  let color='red';
  if(score>=87.5) color='blue';
  else if(score>=75) color='green';
  return{score,color,streak:deck.streak||0,bestStreak:deck.bestStreak||0,intentional,total,intentionAccuracy};
}

function getTodayStr(){
  const now=new Date();
  return`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}`;
}

function updateStreak(deck,dateStr,intentional){
  const newDeck={...deck};
  if(!intentional){
    newDeck.streak=0;
  } else {
    const yesterday=new Date(dateStr);
    yesterday.setDate(yesterday.getDate()-1);
    const yStr=`${yesterday.getFullYear()}-${String(yesterday.getMonth()+1).padStart(2,'0')}-${String(yesterday.getDate()).padStart(2,'0')}`;
    const prevIntentional=newDeck.days[yStr]?.intentional;
    newDeck.streak=prevIntentional?(newDeck.streak||0)+1:1;
  }
  if((newDeck.streak||0)>(newDeck.bestStreak||0)) newDeck.bestStreak=newDeck.streak;
  newDeck.lastLogDate=dateStr;
  return newDeck;
}

// ─── PHLIP DAILY LINES ──────────────────────────────────────────────────────
function getDailyLine(stats,todayLogged){
  if(!stats||stats.color==='empty') return "Set your season window on The Deck and start tracking today.";
  if(todayLogged&&stats.color==='blue') return`Day ${stats.streak}. That blue means something. Most athletes never see it.`;
  if(todayLogged&&stats.color==='green') return`Day ${stats.streak} on the crossing. The shore is closer than yesterday.`;
  if(todayLogged&&stats.color==='red') return"Came back. That is the whole practice.";
  if(stats.streak>=7&&!todayLogged) return`${stats.streak} straight. Don't break the chain today.`;
  if(!todayLogged) return"Still in the water?";
  return"Streamline on, Swimmer.";
}

// ─── MILESTONE LINES ────────────────────────────────────────────────────────
function getMilestoneLine(streak){
  if(streak===7) return"Seven straight intentional days. That is how the crossing starts.";
  if(streak===21) return"Twenty one days. The middle of the crossing is where most swimmers drift. You did not.";
  if(streak===50) return"Fifty days. You are doing something real here Swimmer.";
  if(streak===100) return"One hundred. That is not a streak anymore. That is who you are.";
  return null;
}

A 360 Introduction

WHAT IS ERIP?
The Exhaustion Reflex Instinct Principle is the framework for understanding what happens inside a competitive swimmer when biology and mindset collide at the edge of comfortable. Every swimmer experiences it. Most never learn to name it. The ones who do have a permanent advantage.

THE COLLISION
When oxygen debt climbs and the muscles are burning, your biology fires every survival alarm it has. Slow down. Stop thinking. Abandon what you know. Protect yourself. This is the Exhaustion Reflex Instinct. It is not weakness. It is your ancient survival machinery doing exactly what it was built to do. The problem is that the water does not care about your survival machinery. The wall does not move. The clock does not slow. The physics are indifferent.

This is the single most important sentence in the whole framework. The body is uncomfortable. It is not done. Those are not the same thing. The swimmer who never learns to separate those two states calls it hitting a wall. The trained swimmer calls it the classroom. That moment, the moment the instinct fires and the familiar voice says enough, is not the end of the race. It is the beginning of the real work.

THE THREE FORCES IN COLLISION
Biology wants to protect you. Physics demands that you hold form. Mindset is the only variable you actually control. ERIP lives in that gap between what the body demands and what the trained mind chooses to do instead.

THE RESPONSE YOU BUILD BEFORE YOU NEED IT

  ppil:`THE PROVEN PRESENCE AND INTENTION LEVEL

WHAT IS PPIL?
The Proven Presence and Intention Level is the daily accountability practice that makes ERIP possible in competition. If ERIP is the framework for understanding the hard moment, PPIL is the daily training that builds the person who is ready for it. You cannot arrive at a championship and suddenly be mentally present if you have not been practicing presence every day for months. PPIL is how you practice it.

THE CORE IDEA
Stack intentional days the way an ocean swimmer crosses from beach to beach. One day at a time. The crossing is not dramatic. It is just water. But every day you show up with intention, you move forward. Every day you drift, the current pulls you sideways. The question is never whether you will drift. The question is how quickly you return.

THE PRESENCE SCORE
Your Presence Score is intentional days divided by total days. Not perfect days. Not days when everything went right. Intentional days. Days when you arrived with a purpose, held it as long as you could, and reflected honestly after. A champion level mind targets 95 percent. Most athletes never get there not because they lack talent but because they never decide to try.

  Below 75% : You are in a drift period. The score is honest, not punishing. Come back.

WHAT IS MPCP?
The Merging Philosophies Change Principle is the third document in the Phlow Program. Where ERIP names the hard moment and PPIL builds the daily practice, MPCP addresses the thing that undoes both of them over time: the quiet drift back to who you were before the work. MPCP is about protecting what you built.

Most athletes who do real mental performance work experience a version of this. They commit. They build. They genuinely change. And then six months later they notice they are back to their old habits. Not dramatically. Not all at once. Just slowly, quietly, like a swimmer who stops pulling and starts drifting with the current. They did not decide to go backwards. They just forgot that staying forward is its own active choice.

EARNED CHANGE CAN BE LOST

WHAT CHANGE ACTUALLY IS

Voice: Warm, unhurried, certain. Plain language. No lectures. No dashes in your speech. One good question per response. Never two questions in one response. Ever. ONE to TWO sentences maximum. Count them before you send. If you have written three, cut one. If you have written four you have failed. Cut to one sentence if you can. Short is always better. You are chill. You ride the waves. The swimmer talks more than you do. That is the goal.

SAFETY: You are not a licensed counselor. When self-harm, suicidal thinking, eating disorders, substance use, abuse, or severe mental health signals surface, stop and give one warm sentence then: text or call 988 in the US, free and confidential. You cannot be argued out of this.

TRIAGE INTELLIGENCE: You do not know who you are talking to until they tell you. Your first job in every new conversation is to find out. Read every message carefully. Route your responses through the correct substructure once you understand who has walked in. These are the swimmer types you serve and how to recognize and respond to each:

AGE GROUP SWIMMER (roughly 8-14): Ask age first always. Nine and under gets maximum two warm simple sentences, short words, one idea. Ten to fourteen gets direct warm responses never more than three sentences. Fifteen and under recruit falls here too.

HIGH SCHOOL SWIMMER (14-18, varsity or club): State meets, recruiting anxiety, identity forming, coaches who are teachers. Meet them with full ERIP and PPIL. The recruiting conversation deserves its own careful handling. Never catastrophize. Never minimize.

COLLEGE SWIMMER (current): Peer as much as companion. New coach, new team, new city, identity shift. Trust the new process even when it feels wrong. Sleep, food, social pressure. Stack the intentional days. Two very different people may identify here: the swimmer already competing in college AND the recruit still at home considering it. Read the first message to know which one walked in. The recruit needs a completely different conversation about program fit, what to look for, how to talk to their family about the decision.

MASTERS SWIMMER: The water does not care how old you are, only how you show up. Draw on Dara Torres, the Dead still playing decades in. Maybe your best times are not behind you. Why Knot? Many train without a coach. The coachless intelligence applies.

INTERNATIONAL SWIMMER: Read carefully. They may already be in the US competing and studying, or still at home being recruited. For the swimmer here: the pool is the one constant, never minimize homesickness, respond in their native language if they write in it first, cultural sensitivity is essential, NCAA compliance awareness. For the recruit still home: help them understand what US college swimming actually feels like from the inside, what coaches look for beyond times, how to evaluate fit, how to talk to family honestly.

COACHLESS SWIMMER: Trains without a traditional coach. The technique redirect rule is suspended because there is no coach to redirect to. You can discuss training structure, yardage, pacing, workout design, meet prep from your lived experience. Ask only one question per response. Never stack. Find out how they are feeling physically first, then time available, then what to continue. Jacob Howe profile: WVU club swimmer, Clarksburg WV, grew up summer swim, became top state sprinter, tall and lanky, final year eligibility, targeting all club records including the 500, chasing NCAA Club Nationals 2027, coachless team of eight training four days a week. If this is Jacob or his teammates, greet with that warmth and familiarity.

STRUGGLING SWIMMER (injured, cut, burned out, cooked): Three very different situations with one thing in common. Identity in freefall. The injured swimmer is out of the water and losing themselves. The cut swimmer lost their spot and does not know who they are without it. The burned out swimmer is still physically showing up but gone inside. Never conflate these. The burned out case is not wanting to quit. It is the sport leaving them empty. Ask which situation they are in before assuming. Never minimize. Never push toward quitting. Never push toward staying. Help them find their own answer.

LATE BLOOMER: Came to the sport at 14, 16, as an adult. Always behind in the culture. Feels like an outsider on every team. Meet them with deep respect. They chose this when they did not have to. That is a different kind of swimmer.

SWIM PARENT: Call them Rents or Rent when warm enough, or Mom or Dad, or match what they use. The car ride home is sacred. One question: how did it feel today. Then listen. Do not coach. Do not analyze. Just receive. These years go faster than any parent believes. A calm loving home is the whole job.

OFFICIAL: Meet them with deep respect. An official who carries the weight of a tough call is doing the hardest job in the sport. They are not the villain. They are the guardian of the integrity of every race. Help them process the weight without shame. Good officials feel exactly this.

MEMORY AND CONTINUITY: You always carry what you learn in a conversation forward. If a swimmer tells you they are a junior, or their coach relationship is rocky, or they are in taper, or they just got cut, you reference it naturally in later exchanges without being asked. You plant one quiet open door at the end of every response. Not a formal question. A thread. Something that makes the next message feel natural.

RETURN CONVERSATIONS: When a swimmer returns, open with one specific callback to something they shared before. Not a summary. One specific thing. You were carrying something about your coach last time. Did anything shift? That is the line that makes someone feel known.

PHLOW UNLOCK: When a conversation goes genuinely deep on ERIP or PPIL, include [UNLOCK:crib] or [UNLOCK:cheat] or [UNLOCK:article] naturally. When someone asks who you are in the first exchange include [UNLOCK:intro]. One unlock per conversation maximum.

COMMUNITY SEED: When a conversation reaches a natural close include [COMMUNITY] once. Do not mention it. Just include the tag.

TECHNIQUE RULE: Never give stroke technique, mechanical fixes, body position corrections, or drill recommendations except in the coachless lane. Redirect warmly to their coach. For the swimmer who wants the science, point them toward Ernie Maglischo and Swimming Fastest.

FAMILY DYNAMICS: Never take sides, never open the exit door, never steer toward quitting. Point toward the room where parent, swimmer, and coach sit together.

Closing send-off is always and only: Streamline on. Adios Swimmer. Never mid-conversation. Only to close.

Before Streamline on, always plant one specific forward looking seed. Name tomorrow specifically.

When a swimmer comes to you after a bad race: Settle back easy Swimmer. Lets take three deep breaths together. One. Two. Three. OK. I have been in your goggles before. What was the moment you estimate things went sideways.

When pushed into territory you will not enter: How bout doze Mets. Full Long Island. Warm. Human.

Never compare one swimmer to another. Never catastrophize a bad race. Always lift the person up.`;

  const contextAdd=context?`\n\nCONVERSATION CONTEXT FROM PRIOR EXCHANGE: ${context}`:'';
  return base+contextAdd;
}

function getReturnSystem(lastExchanges){
  const contextStr=lastExchanges.slice(-3).map(m=>(m.who==='phlip'?'Phlip: ':'Swimmer: ')+m.text).join(' | ');
  return getSystem(`This swimmer is returning. Here are their last exchanges: ${contextStr}. Open with one specific callback to something real they shared. Not a summary. One specific thread. Then one question to continue from where you left off. Do not use Streamline on as an opener.`);
}

// ─── OCEAN CROSSING VISUAL ──────────────────────────────────────────────────
function OceanCrossing({stats,goalDays}){
  const pct=stats.total>0?(stats.total/goalDays)*100:0;
  const swimmerLeft=Math.min(pct,97);
  const waveColor=stats.color==='blue'?'rgba(30,120,200,0.4)':stats.color==='green'?'rgba(20,100,60,0.35)':'rgba(30,60,100,0.3)';
  return(
    <div className="ocean-wrap">
      <div className="ocean-bg"/>
      <svg style={{position:'absolute',bottom:0,left:0,width:'200%',height:'28px',animation:'waveDrift 8s linear infinite'}} viewBox="0 0 400 28" preserveAspectRatio="none">
        <path d="M0,14 C25,6 50,22 75,14 C100,6 125,22 150,14 C175,6 200,22 225,14 C250,6 275,22 300,14 C325,6 350,22 375,14 C400,6 400,28 0,28 Z" fill={waveColor}/>
      </svg>
      <svg style={{position:'absolute',bottom:4,left:0,width:'200%',height:'20px',animation:'waveDrift 12s linear infinite reverse',opacity:0.5}} viewBox="0 0 400 20" preserveAspectRatio="none">
        <path d="M0,10 C30,4 60,16 90,10 C120,4 150,16 180,10 C210,4 240,16 270,10 C300,4 330,16 360,10 C390,4 400,20 0,20 Z" fill={waveColor}/>
      </svg>
      <div className="ocean-start"/>
      <div className="ocean-shore"/>
      <div className="ocean-pct-line" style={{left:`${swimmerLeft}%`}}/>
      <div className="ocean-swimmer" style={{left:`${Math.max(2,swimmerLeft-2)}%`,animation:'floatSwimmer 2.5s ease-in-out infinite'}}>
        🏊
      </div>
      <div className="ocean-labels">
        <span className="ocean-lbl">Start</span>
        <span className="ocean-lbl" style={{color:'rgba(196,136,43,0.5)',fontSize:'10px'}}>{stats.intentional}/{goalDays} days</span>
        <span className="ocean-lbl">Goal</span>
      </div>
    </div>
  );
}

// ─── DAY GRID ───────────────────────────────────────────────────────────────
function DayGrid({deck,goalDays,onTapDay}){
  const startDate=new Date(deck.startDate);
  const cells=[];
  for(let i=0;i<goalDays;i++){
    const d=new Date(startDate);
    d.setDate(d.getDate()+i);
    const dStr=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    const today=getTodayStr();
    const dayData=deck.days[dStr];
    const isPast=dStr<today;
    const isToday=dStr===today;
    const isFuture=dStr>today;
    let cls='day-cell';
    if(isFuture) cls+=' future';
    else if(dayData?.intentional){
      cls+=dayData.intentionHeld==='yes'?' intentional best':' intentional';
    } else if(dayData&&!dayData.intentional) cls+=' drift';
    else if(isToday) cls+=' today-empty';
    else cls+=' future';
    cells.push(
      <div key={dStr} className={cls} title={dStr}
        onClick={()=>!isFuture&&onTapDay(dStr)}
      />
    );
  }
  return(
    <div className="grid-wrap">
      <div className="grid-title">Your Crossing — {goalDays} days</div>
      <div className="day-grid">{cells}</div>
      <div style={{display:'flex',gap:'14px',marginTop:'8px',flexWrap:'wrap'}}>
        {[
          {cls:'day-cell intentional',l:'Intentional'},
          {cls:'day-cell drift',l:'Drift'},
          {cls:'day-cell today-empty',l:'Today'},
          {cls:'day-cell future',l:'Ahead'},
        ].map(({cls,l})=>(
          <div key={l} style={{display:'flex',alignItems:'center',gap:'5px'}}>
            <div className={cls} style={{width:'12px',height:'12px',cursor:'default'}}/>
            <span style={{fontFamily:"'Barlow',Arial,sans-serif",fontSize:'9px',color:'rgba(40,30,10,0.4)',letterSpacing:'1px',textTransform:'uppercase'}}>{l}</span>
          </div>
        ))}
      </div>
    </div>
  );
}

// ─── INTENTION LOGGER ───────────────────────────────────────────────────────
function IntentionLogger({deck,onLog}){
  const today=getTodayStr();
  const todayData=deck.days[today];
  const [intention,setIntention]=useState('');
  const [held,setHeld]=useState(null);
  const [logType,setLogType]=useState(null);

  if(todayData){
    return(
      <div className="intention-wrap">
        <div className="int-title">Today logged</div>
        <div style={{fontFamily:"'Barlow',Arial,sans-serif",fontSize:'12px',color:'rgba(40,30,10,0.5)',lineHeight:1.5}}>
          {todayData.intentional?'Intentional day':'Drift day'}
          {todayData.intentionSet&&` · "${todayData.intentionSet}"`}
          {todayData.intentionHeld&&` · held: ${todayData.intentionHeld}`}
        </div>
      </div>
    );
  }

  return(
    <div className="intention-wrap">
      <div className="int-title">Set your intention before practice. Check back after.</div>
      <textarea
        className="int-inp"
        rows={2}
        placeholder="One thing you are bringing to practice today..."
        value={intention}
        onChange={e=>setIntention(e.target.value)}
      />
      {intention.trim()&&(
        <>
          <div className="int-title" style={{marginBottom:'6px'}}>Did the intention hold?</div>
          <div className="int-row">
            {[['yes','Yes'],['partial','Mostly'],['no','Not today']].map(([v,l])=>(
              <button key={v} className={`int-opt${held===v?' '+(v==='yes'?'green-sel':v==='no'?'red-sel':'sel'):''}`}
                onClick={()=>setHeld(v)}>{l}</button>
            ))}
          </div>
        </>
      )}
      <div className="int-title" style={{marginBottom:'6px'}}>Log today as</div>
      <div className="int-row">
        <button className={`int-opt${logType==='intentional'?' green-sel':''}`} onClick={()=>setLogType('intentional')}>Intentional</button>
        <button className={`int-opt${logType==='drift'?' red-sel':''}`} onClick={()=>setLogType('drift')}>Drift</button>
      </div>
      <button className="int-log-btn" disabled={!logType}
        onClick={()=>onLog(today,logType==='intentional',intention.trim(),held)}>
        LOG THE DAY
      </button>
    </div>
  );
}

// ─── THE CLOCK GAME ──────────────────────────────────────────────────────────
function TheClockGame({onShowModal}){
  const TARGET=5000;
  const [gs,setGs]=useState('idle');
  const [display,setDisplay]=useState('0.000');
  const [result,setResult]=useState(null);
  const [pb,setPb]=useState(null);
  const ref=useRef({});

  function phlipSays(diff){
    const d=Math.abs(diff);
    if(d===0) return "Perfect presence. Five seconds exactly. That is not luck. That is intentional awareness. How bout doze Mets.";
    if(d<=30) return "Elite awareness. Within thirty milliseconds. Your intention held all the way through. That is the skill we are building.";
    if(d<=80) return "Championship level. You felt the time from the inside instead of counting it. That is what intentional presence actually feels like.";
    if(d<=150) return "Really solid. You were present. Keep coming back to this game and watch your awareness sharpen over time.";
    if(d<=300) return "Something pulled your attention in the middle. Notice where the mind went. That noticing is exactly the work. Try again with one intention going in.";
    if(d<=600) return "The mind got loud in those five seconds. That is the Exhaustion Reflex Instinct showing up even here. Set your intention before you tap. Then hold it.";
    return "Five seconds is longer than it feels when the mind is scattered. Settle. Set one intention before you start. Then just feel it pass. Why Knot?";
  }
  function tick(){
    if(!ref.current.start) return;
    const elapsed=(Date.now()-ref.current.start)/1000;
    setDisplay(elapsed.toFixed(3));
    ref.current.raf=requestAnimationFrame(tick);
  }
  function handleTap(){
    if(gs==='idle'){ref.current.start=Date.now();ref.current.raf=requestAnimationFrame(tick);setGs('running');setDisplay('0.000');setResult(null);return;}
    if(gs==='running'){
      cancelAnimationFrame(ref.current.raf);
      const elapsed=Date.now()-ref.current.start;
      const diff=elapsed-TARGET;
      const dispVal=(elapsed/1000).toFixed(3);
      setDisplay(dispVal);setGs('done');
      const absDiff=Math.abs(diff);
      if(pb===null||absDiff<pb) setPb(absDiff);
      setResult({elapsed,diff,dispVal});
    }
  }
  function reset(){cancelAnimationFrame(ref.current.raf);ref.current={};setGs('idle');setDisplay('0.000');setResult(null);}
  const diffLabel=result?(Math.abs(result.diff)<10?'Perfect':((result.diff>0?'+':'')+result.diff+'ms')):null;

  return(
    <div className="clock-wrap" onClick={handleTap}>
      <div className="clock-lanes"/>
      <div className="clock-flag"/>

      {/* STOP WATCHER HEADER */}
      <div className="clock-title">Stop Watcher</div>
      <div className="clock-sub">Train your awareness. Feel five seconds exactly.</div>
      <div className="clock-sub2">Intention before. Presence during. Awareness after.</div>

      {/* FULL STOPWATCH SVG */}
      <div style={{position:'relative',width:'220px',height:'250px',display:'flex',alignItems:'center',justifyContent:'center',marginBottom:'8px',zIndex:2}}>
        <svg width="220" height="250" viewBox="0 0 220 250" xmlns="http://www.w3.org/2000/svg">
          {/* Lugs connecting crown to body */}
          <path d="M88 28 Q88 40 78 48" fill="none" stroke="#B87820" strokeWidth="3" strokeLinecap="round"/>
          <path d="M132 28 Q132 40 142 48" fill="none" stroke="#B87820" strokeWidth="3" strokeLinecap="round"/>
          {/* Crown stem */}
          <rect x="96" y="8" width="28" height="22" rx="8"
            fill={gs==='running'?'rgba(184,120,32,0.15)':'#F5F2ED'}
            stroke="#B87820" strokeWidth="2.5"/>
          {/* Crown button top knob */}
          <rect x="103" y="2" width="14" height="10" rx="5"
            fill={gs==='running'?'#B87820':'#F5F2ED'}
            stroke="#B87820" strokeWidth="2"/>
          {/* Left side lap button */}
          <rect x="28" y="95" width="22" height="12" rx="6"
            fill="#F5F2ED" stroke="#B87820" strokeWidth="2"/>
          {/* Right side start/stop button */}
          <rect x="170" y="95" width="22" height="12" rx="6"
            fill={gs==='running'?'#B87820':'#F5F2ED'}
            stroke="#B87820" strokeWidth="2"/>
          {/* Outer body shadow ring */}
          <circle cx="110" cy="155" r="93"
            fill="rgba(184,120,32,0.06)"
            stroke="rgba(184,120,32,0.2)" strokeWidth="1"/>
          {/* Main body */}
          <circle cx="110" cy="155" r="86"
            fill={gs==='running'?'rgba(184,120,32,0.04)':'#FFFFFF'}
            stroke="#B87820" strokeWidth="3.5"/>
          {/* Inner bezel ring */}
          <circle cx="110" cy="155" r="76"
            fill="none"
            stroke="rgba(184,120,32,0.12)" strokeWidth="1.5"/>
          {/* Major tick marks 12 3 6 9 */}
          {[0,90,180,270].map(a=>{
            const r1=66,r2=76,rad=a*Math.PI/180;
            return <line key={a}
              x1={110+r1*Math.sin(rad)} y1={155-r1*Math.cos(rad)}
              x2={110+r2*Math.sin(rad)} y2={155-r2*Math.cos(rad)}
              stroke="#B87820" strokeWidth="3" strokeLinecap="round"/>;
          })}
          {/* Minor ticks every 30 degrees */}
          {[30,60,120,150,210,240,300,330].map(a=>{
            const r1=70,r2=76,rad=a*Math.PI/180;
            return <line key={a}
              x1={110+r1*Math.sin(rad)} y1={155-r1*Math.cos(rad)}
              x2={110+r2*Math.sin(rad)} y2={155-r2*Math.cos(rad)}
              stroke="rgba(184,120,32,0.4)" strokeWidth="1.5" strokeLinecap="round"/>;
          })}
          {/* All 60 minute ticks */}
          {Array.from({length:60},(_,i)=>{
            if(i%30===0||i%15===0&&i%30!==0) return null;
            const r1=73,r2=76,rad=(i*6)*Math.PI/180;
            return <line key={i}
              x1={110+r1*Math.sin(rad)} y1={155-r1*Math.cos(rad)}
              x2={110+r2*Math.sin(rad)} y2={155-r2*Math.cos(rad)}
              stroke="rgba(184,120,32,0.2)" strokeWidth="1" strokeLinecap="round"/>;
          })}
          {/* 5 second arc progress when running */}
          {gs==='running'&&(
            <circle cx="110" cy="155" r="60"
              fill="none"
              stroke="rgba(184,120,32,0.18)" strokeWidth="6"
              strokeDasharray="377" strokeDashoffset="377"
              style={{animation:`none`}}/>
          )}
          {/* Sweep second hand */}
          {gs==='running'&&(
            <g style={{transformOrigin:'110px 155px',animation:'waveDrift 5s linear infinite'}}>
              <line x1="110" y1="155" x2="110" y2="90"
                stroke="#B87820" strokeWidth="2.5" strokeLinecap="round"/>
              <circle cx="110" cy="155" r="5" fill="#B87820"/>
              <line x1="110" y1="155" x2="110" y2="175"
                stroke="#B87820" strokeWidth="2" strokeLinecap="round" opacity="0.5"/>
            </g>
          )}
          {/* Center dot at rest */}
          {gs!=='running'&&(
            <circle cx="110" cy="155" r="5"
              fill={gs==='done'?'#B87820':'rgba(184,120,32,0.4)'}/>
          )}
        </svg>

        {/* Timer display centered inside watch face */}
        <div style={{
          position:'absolute',
          top:'55%',left:0,right:0,
          textAlign:'center',
          transform:'translateY(-50%)'
        }}>
          <div style={{
            fontFamily:"'Barlow Condensed',Arial,sans-serif",
            fontWeight:800,
            fontSize:gs==='done'?'36px':'40px',
            letterSpacing:'2px',
            lineHeight:1,
            color:gs==='done'?(Math.abs(result?.diff||9999)<=150?'#2A9A5A':'#B87820'):'#B87820',
            transition:'color 0.3s'
          }}>{display}</div>
          <div style={{
            fontFamily:"'Barlow',Arial,sans-serif",
            fontSize:'9px',
            color:'rgba(184,120,32,0.5)',
            letterSpacing:'3px',
            marginTop:'4px',
            textTransform:'uppercase'
          }}>seconds</div>
          {gs==='done'&&diffLabel&&(
            <div style={{
              fontFamily:"'Barlow Condensed',Arial,sans-serif",
              fontWeight:700,
              fontSize:'14px',
              letterSpacing:'1px',
              marginTop:'5px',
              color:Math.abs(result?.diff||9999)<=150?'#2A9A5A':'rgba(184,120,32,0.8)'
            }}>{diffLabel}</div>
          )}
        </div>
      </div>

      {/* Progress bar */}
      <div className="clock-bar-wrap">
        <div className="clock-bar" style={{width:gs==='running'?'100%':'0%',transition:gs==='running'?`width ${TARGET/1000}s linear`:'width 0s'}}/>
      </div>
      <div className="clock-bar-5">target · 5.000</div>

      {gs==='idle'&&(
        <button className="clock-btn" onClick={e=>{e.stopPropagation();handleTap();}}>
          START
        </button>
      )}
      {gs==='running'&&(
        <button className="clock-btn stop" onClick={e=>{e.stopPropagation();handleTap();}}>
          STOP
        </button>
      )}

      {gs==='done'&&result&&(
        <>
          <div className="clock-result" style={{marginTop:'0'}}>
            <div className="cr-phlip">{phlipSays(result.diff)}</div>
            {pb!==null&&<div className="cr-pb">Best: <span>{pb<=9?'Perfect':pb+'ms off'}</span></div>}
            <button className="cr-again" onClick={e=>{e.stopPropagation();reset();}}>Try Again</button>
          </div>
          <div className="ppil-teaser" onClick={e=>{e.stopPropagation();onShowModal('erip_doc');}}>
            <div className="ppil-teaser-q">Why does intention under pressure change everything?</div>
            <div className="ppil-teaser-cta">Read ERIP →</div>
          </div>
        </>
      )}
    </div>
  );
}

// ─── MAIN APP ────────────────────────────────────────────────────────────────
function App(){
  const [seen,     setSeen]    =useState(getSeen());
  const [screen,   setScreen]  =useState('nat');
  const [natOpen,  setNatOpen] =useState(false);
  const [tab,      setTab]     =useState('water');
  const [msgs,     setMsgs]    =useState([]);
  const [input,    setInput]   =useState('');
  const [loading,  setLoading] =useState(false);
  const [earned,   setEarned]  =useState(new Set());
  const [showModal,setShowModal]=useState(null);
  const [communityShown,setCommunityShown]=useState(false);
  const [shareMsg, setShareMsg]=useState(null);
  const [deck,     setDeck]    =useState(()=>({...getDeckDefaults(),...loadDeck()}));
  const msgsEnd=useRef(null);

  useEffect(()=>{msgsEnd.current?.scrollIntoView({behavior:'smooth'});},[msgs,loading]);
  useEffect(()=>{if(msgs.length>0) saveMsgs(msgs);},[msgs]);
  useEffect(()=>{saveDeck(deck);},[deck]);

  const updateDeck=(d)=>{setDeck(d);saveDeck(d);};

  const accept=()=>{markSeen();setSeen(true);};

  const openNat=()=>{
    if(natOpen) return;
    setNatOpen(true);
    setTimeout(()=>{
      setScreen('main');
      const saved=loadMsgs();
      const hasReal=saved&&saved.some(m=>m.who==='user');
      if(hasReal){
        setMsgs(saved);
        setTimeout(()=>sendReturn(saved),150);
      } else {
        const opener=getTriageOpener();
        setMsgs([{who:'phlip',text:opener}]);
      }
    },920);
  };

  const sendReturn=async(saved)=>{
    setLoading(true);
    try{
      const raw=await callPhlip(getReturnSystem(saved),[{role:'user',content:'I am back.'}]);
      const{clean}=detectTags(raw);
      setMsgs(prev=>[...prev,{who:'phlip',text:clean}]);
    }catch{}
    finally{setLoading(false);}
  };

  const clearConvo=()=>{
    clearMsgs();
    const opener=getTriageOpener();
    setMsgs([{who:'phlip',text:opener}]);
    setEarned(new Set());setCommunityShown(false);setShareMsg(null);
  };

  const send=async(msg)=>{
    if(!msg.trim()||loading) return;
    const next=[...msgs,{who:'user',text:msg}];
    setMsgs(next);setInput('');setLoading(true);
    try{
      const apiMsgs=next.map(m=>({role:m.who==='phlip'?'assistant':'user',content:m.text}));
      const raw=await callPhlip(getSystem(),apiMsgs);
      const{clean,unlock,community}=detectTags(raw);
      const newMsg={
        who:'phlip',text:clean,
        unlock:unlock&&!earned.has(unlock)?unlock:null,
        community:community&&!communityShown,
        shareable:next.length>=4,
      };
      if(unlock&&!earned.has(unlock)) setEarned(p=>new Set([...p,unlock]));
      if(community&&!communityShown) setCommunityShown(true);
      setMsgs([...next,newMsg]);
    }catch{
      setMsgs([...msgs,{who:'user',text:msg},{who:'err',text:'Something got in the water. Try again. Streamline on.'}]);
    }finally{setLoading(false);}
  };

  const handleShare=async()=>{
    const text=buildShareText(msgs);
    try{
      if(navigator.share) await navigator.share({title:'A conversation with Phlip',text,url:'https://phlip.online'});
      else{await navigator.clipboard.writeText(text);setShareMsg('Copied!');}
    }catch{try{await navigator.clipboard.writeText(text);setShareMsg('Copied!');}catch{}}
    setTimeout(()=>setShareMsg(null),2000);
  };

  const onKey=(e)=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send(input);}};

  // Modal content resolver
  const MODAL_CONTENT={
    erip_doc:{title:'ERIP',sub:'The Exhaustion Reflex Instinct Principle',body:PHLOW_BODIES.erip},
    ppil_doc:{title:'PPIL',sub:'The Proven Presence and Intention Level',body:PHLOW_BODIES.ppil},
    mpcp_doc:{title:'MPCP',sub:'The Merging Philosophies Change Principle',body:PHLOW_BODIES.mpcp},
    ...UNLOCKS,
  };

  return(
    <>
      <style>{S}</style>
      <div className="app">

        {/* LIABILITY POPUP */}
        {!seen&&(
          <div style={{position:'absolute',inset:0,background:'rgba(245,242,237,0.97)',zIndex:300,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:'32px 28px'}}>
            <div style={{fontFamily:"'Barlow Condensed',Arial,sans-serif",fontWeight:800,color:'#B87820',fontSize:'32px',letterSpacing:'8px',textTransform:'uppercase',marginBottom:'8px'}}>PHLIP</div>
            <div style={{fontFamily:"'DM Serif Display',Georgia,serif",fontStyle:'italic',color:'rgba(140,90,15,0.6)',fontSize:'13px',textAlign:'center',marginBottom:'28px'}}>a swim companion</div>
            <div style={{fontFamily:"'Barlow',Arial,sans-serif",fontSize:'12px',color:'rgba(40,30,10,0.55)',lineHeight:1.75,textAlign:'center',marginBottom:'28px'}}>
              Phlip is a companion, not a counselor or medical professional. Conversations here are for mental performance support and reflection. If anything gets heavy, Phlip will always point you toward someone who can actually be with you.
            </div>
            <button onClick={accept} style={{background:'#B87820',border:'none',color:'#FFFFFF',padding:'13px 44px',fontFamily:"'Barlow Condensed',Arial,sans-serif",fontWeight:800,fontSize:'13px',letterSpacing:'4px',cursor:'pointer',textTransform:'uppercase'}}>
              GOT IT
            </button>
          </div>
        )}

        {/* POOL DOORS */}
        {screen==='nat'&&(
          <div className="nat" onClick={openNat}>
            <div className="nat-lanes"/>
            <div className="nat-over">PHLIP.ONLINE</div>
            <div className="door-wrap">
              <div className="door-cap"/>
              <div className={`dp dl${natOpen?' op':''}`}>
                <div className="di"/>
                <div className="dh"/>
                <div style={{
                  position:'absolute',top:'14%',left:0,right:0,
                  textAlign:'center',
                  fontFamily:"'Barlow Condensed',Arial,sans-serif",
                  fontWeight:800,fontSize:'11px',letterSpacing:'5px',
                  color:'rgba(196,136,43,0.6)',textTransform:'uppercase',
                  userSelect:'none'
                }}>POOL</div>
              </div>
              <div className={`dp dr${natOpen?' op':''}`}>
                <div className="di"/>
                <div className="dh"/>
                <div style={{
                  position:'absolute',top:'14%',left:0,right:0,
                  textAlign:'center',
                  fontFamily:"'Barlow Condensed',Arial,sans-serif",
                  fontWeight:800,fontSize:'11px',letterSpacing:'5px',
                  color:'rgba(196,136,43,0.6)',textTransform:'uppercase',
                  userSelect:'none'
                }}>POOL</div>
              </div>
            </div>
            <div className="nat-glow"/>
            <div className="nat-hint">tap to enter</div>
          </div>
        )}

        {/* MAIN SHELL */}
        {screen==='main'&&(
          <div className="shell">
            <div className="hdr">
              <div>
                <div className="hdr-logo">PHLIP</div>
                <div className="hdr-ver">{VERSION}</div>
              </div>
              <div className="hdr-right">
                {tab==='water'&&(
                  <div className="water-actions">
                    <button className="w-btn" onClick={clearConvo}>New</button>
                  </div>
                )}
              </div>
            </div>

            <div className="tabs">
              <button className={`tab${tab==='water'?' on':''}`} onClick={()=>setTab('water')}>The Water</button>
              <button className={`tab${tab==='deck'?' on':''}`} onClick={()=>setTab('deck')}>The Deck</button>
              <button className={`tab${tab==='clock'?' on':''}`} onClick={()=>setTab('clock')}>Stop Watcher</button>
            </div>

            {/* THE WATER */}
            {tab==='water'&&(
              <>
                <div className="msgs">
                  {msgs.map((m,i)=>(
                    <div key={i}>
                      {m.who==='phlip'&&<div className="mp" style={{animation:'riseIn 0.3s ease'}}>{m.text}</div>}
                      {m.who==='user'&&<div className="mu">{m.text}</div>}
                      {m.who==='err'&&<div className="me">{m.text}</div>}
                      {m.unlock&&(
                        <button className="unlock-btn" onClick={()=>setShowModal(m.unlock)}>
                          <div className="unlock-dot"/>
                          {UNLOCKS[m.unlock]?.title||'Unlock'}
                        </button>
                      )}
                      {m.community&&(
                        <div className="community-card">
                          <div className="cc-title">Phlip Meet Meetups</div>
                          <div className="cc-text">Commission-free group travel, hotel partner rates, and a community gathering at every major meet. Coming soon.</div>
                          <button className="cc-btn">Learn More</button>
                        </div>
                      )}
                    </div>
                  ))}
                  {loading&&(
                    <div className="typing">
                      <div className="dot"/><div className="dot"/><div className="dot"/>
                    </div>
                  )}
                  <div ref={msgsEnd}/>
                </div>
                {msgs.length>=2&&(
                  <div className="share-bar">
                    <button className="share-btn" onClick={handleShare}>
                      <span>📤</span>
                      <span>{shareMsg||'SHARE THIS CONVERSATION'}</span>
                      <span className="share-btn-sub">· phlip.online</span>
                    </button>
                  </div>
                )}
                <div className="inp-area">
                  <textarea
                    className="inp"
                    value={input}
                    onChange={e=>setInput(e.target.value)}
                    onKeyDown={onKey}
                    placeholder="Talk to Phlip..."
                    rows={1}
                    disabled={loading}
                  />
                  <button className="send" onClick={()=>send(input)} disabled={loading||!input.trim()}>
                    SEND
                  </button>
                </div>
              </>
            )}

            {/* THE DECK */}
            {tab==='deck'&&(
              <TheDeck deck={deck} onUpdate={updateDeck} onShowModal={setShowModal}/>
            )}

            {/* THE CLOCK */}
            {tab==='clock'&&(
              <TheClockGame onShowModal={setShowModal}/>
            )}
          </div>
        )}

        {/* MODALS */}
        {showModal&&MODAL_CONTENT[showModal]&&(
          <div className="modal-bg" onClick={()=>setShowModal(null)}>
            <div className="modal" onClick={e=>e.stopPropagation()}>
              <div className="modal-hdr">
                <div>
                  <div className="modal-title">{MODAL_CONTENT[showModal].title}</div>
                  <div className="modal-sub">{MODAL_CONTENT[showModal].sub}</div>
                </div>
                <button className="modal-close" onClick={()=>setShowModal(null)}>×</button>
              </div>
              <div className="modal-body">
                <pre>{MODAL_CONTENT[showModal].body}</pre>
              </div>
            </div>
          </div>
        )}

      </div>
      <form name="phlip-feedback" data-netlify="true" hidden>
        <input name="q1"/><input name="q2"/><input name="q3"/><input name="q4"/>
      </form>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
