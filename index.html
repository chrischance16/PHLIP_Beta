<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phlip Beta</title>
    <style>
        body { background: #071E38; color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        #root { width: 100%; max-width: 400px; text-align: center; padding: 20px; }
        .logo { color: #C4882B; font-size: 50px; font-weight: 800; letter-spacing: 5px; margin-bottom: 10px; }
        .btn { display: block; width: 100%; background: rgba(196,136,43,0.2); border: 1px solid #C4882B; color: white; padding: 15px; margin: 10px 0; border-radius: 8px; cursor: pointer; font-size: 16px; }
        .btn:hover { background: #C4882B; color: #071E38; }
    </style>
</head>
<body>
    <div id="root">
        <div class="logo">PHLIP</div>
        <p style="font-style: italic; color: rgba(196,136,43,0.8);">Welcome to the Deck</p>
        <div id="lanes">
            <button class="btn" onclick="alert('Phlip is warming up! API connecting...')">9 & Under</button>
            <button class="btn" onclick="alert('Phlip is warming up! API connecting...')">10 to 14</button>
            <button class="btn" onclick="alert('Phlip is warming up! API connecting...')">15 to 18</button>
            <button class="btn" onclick="alert('Phlip is warming up! API connecting...')">College</button>
            <button class="btn" onclick="alert('Phlip is warming up! API connecting...')">Masters</button>
            <button class="btn" onclick="alert('Phlip is warming up! API connecting...')">Parent Zone</button>
        </div>
    </div>
</body>
</html>
